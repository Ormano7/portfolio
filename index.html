<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio de Projetos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Paulo Ormano</h1>
    <nav>
      <ul>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#projetos">Projetos</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <section id="sobre">
    <h2>Sobre Mim</h2>
    <img src="po7.png" alt="Foto de Paulo Ormano">
    <p>Sou desenvolvedor em formação, apaixonado por tecnologia e programação. Estou aprendendo HTML, CSS e JavaScript para criar projetos incríveis.</p>
  </section>

  <section id="projetos">
    <h2>Meus Projetos</h2>
    <div class="grade" id="container-projetos"></div>
  </section>

  <section id="contato">
    <h2>Contato</h2>

    <form id="form-contato">

      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome">

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email">

      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" rows="5"></textarea>

      <button type="submit">Enviar</button>

    </form>

    <p id="mensagem-feedback"></p>

  </section>

  <footer>
    <p>2026 - Desenvolvido por Paulo Ormano</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
